controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    motor_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    platform_effort_controller:
      type: effort_controllers/JointGroupEffortController

motor_velocity_controller:
  ros__parameters:
    joints:
      - tl_motor_joint
      - tr_motor_joint
      - bl_motor_joint
      - br_motor_joint
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity

platform_effort_controller:
  ros__parameters:
    joints:
      - platform_x_joint
      - platform_z_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
