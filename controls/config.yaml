# Robot Frame Dimensions (meters)
frame:
  width: 1.56       # Horizontal distance between anchors
  height: 1.32      # Vertical distance between anchors

# Platform Dimensions (meters)
robot:
  width: 0.3 # 0.2
  height: 0.45 # 0.3

# Motor Configuration
motor:
  spool_radius: 0.0254      # Radius of cable spool (m)
  spool_width: 0.02         # Usable spool width along axle (m)
  strap_thickness: 0.001    # Strap thickness; increases radius each radial layer (m)
  strap_width: 0.01         # Strap width laid along spool width (m)
  wrap_integration_step: 0.002  # Integration segment for variable-radius conversion (m)
  initial_wound_turns: [0, 0, 0, 0]  # BL, TR, BR, TL estimated turns initially on spool
  steps_per_rev: 1600     # 200 steps/rev * 16 microsteps
  max_speed_rpm: 30
  cable_thickness: 0.001
  initial_length: # Calculate based on center position

# Motion Control
motion:
  position_tolerance: 0.01  # Target arrival threshold (m)
  safety_margin: 0.1        # Workspace margin from edges (m)

# Serial Port Configuration
serial:
  motor_port: "/dev/ttyACM0"
  sensor_port: "/dev/ttyUSB1"
  baud_rate: 115200
  timeout: 1.0

# Camera Configuration
camera:
  device_index: 0
  width: 640
  height: 480

# Home Position (center of frame)
home:
  x: 0.78
  y: 0.66
