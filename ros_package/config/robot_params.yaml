# Physical dimensions (m)
pulley_separation_x: 1.65    # Horizontal distance between the two pulleys
pulley_separation_y: 1.35    # Vertical distance between the two pulleys
spool_radius: 0.1           # Radius of the pulley spool, will we need this?

# Motor
steps_per_rev: 200*16
max_speed_rpm: 3000

# Motion Controller
state_publish_rate: 10.0  # Hz
position_tolerance: 0.01  # m

# Vision
confidence_threshold: 0.5  # Minimum confidence for trusting a clean

# Navigation
margin: 0.1                   # m, safety margin for navigation
default_clean_spacing: 0.15   # m, default spacing between clean points